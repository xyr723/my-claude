---
# playbooks/tasks/sync_config_tasks.yml
# 同步 Claude 配置到 ~/.claude

- name: 显示阶段信息
  debug:
    msg: |
      ========================================
      阶段 3：同步配置到 ~/.claude
      ========================================

- name: 创建 ~/.claude 目录
  file:
    path: ~/.claude
    state: directory
    mode: "0755"

- name: 创建备份目录 tmps/backup
  file:
    path: "{{ playbook_dir }}/../tmps/backup"
    state: directory
    mode: "0755"

- name: 渲染 claude settings.yml
  template:
    src: "{{ playbook_dir }}/../claude-assets/settings.yml.j2"
    dest: /tmp/claude_settings.yml
    mode: "0644"

- name: 读取渲染后的 YAML
  slurp:
    src: /tmp/claude_settings.yml
  register: rendered_settings

- name: 生成新的 settings.json（临时文件）
  copy:
    content: "{{ rendered_settings.content | b64decode | from_yaml | to_nice_json }}"
    dest: /tmp/claude_settings_new.json
    mode: "0644"

- name: 检查现有 settings.json 是否存在
  stat:
    path: ~/.claude/settings.json
  register: existing_settings

- name: 格式化现有 settings.json（如果存在）
  shell: |
    if command -v jq >/dev/null 2>&1; then
      jq -S . ~/.claude/settings.json > /tmp/claude_settings_existing_sorted.json 2>/dev/null || cp ~/.claude/settings.json /tmp/claude_settings_existing_sorted.json
    else
      cp ~/.claude/settings.json /tmp/claude_settings_existing_sorted.json
    fi
  when: existing_settings.stat.exists
  changed_when: false

- name: 格式化新的 settings.json
  shell: |
    if command -v jq >/dev/null 2>&1; then
      jq -S . /tmp/claude_settings_new.json > /tmp/claude_settings_new_sorted.json 2>/dev/null || cp /tmp/claude_settings_new.json /tmp/claude_settings_new_sorted.json
    else
      cp /tmp/claude_settings_new.json /tmp/claude_settings_new_sorted.json
    fi
  changed_when: false

- name: 检查是否有差异
  shell: |
    if [ -f /tmp/claude_settings_existing_sorted.json ]; then
      diff -u /tmp/claude_settings_existing_sorted.json /tmp/claude_settings_new_sorted.json || true
    else
      echo "NEW_FILE"
    fi
  register: settings_diff
  changed_when: false

- name: 显示配置差异
  debug:
    msg: |
      ========================================
      settings.json 差异预览
      ========================================
      {% if settings_diff.stdout == "NEW_FILE" %}
      这是首次创建 settings.json 文件
      {% elif settings_diff.stdout == "" %}
      ✓ 配置无变化，无需更新
      {% else %}
      {{ settings_diff.stdout }}
      {% endif %}

- name: 生成时间戳
  shell: date +"%Y%m%d_%H%M%S"
  register: timestamp
  when: existing_settings.stat.exists and settings_diff.stdout != "" and settings_diff.stdout != "NEW_FILE"
  changed_when: false

- name: 备份现有 settings.json
  copy:
    src: ~/.claude/settings.json
    dest: "{{ playbook_dir }}/../tmps/backup/settings.json.{{ timestamp.stdout }}"
    mode: "0644"
  when: existing_settings.stat.exists and settings_diff.stdout != "" and settings_diff.stdout != "NEW_FILE"

- name: 显示备份信息
  debug:
    msg: |
      备份已创建：tmps/backup/settings.json.{{ timestamp.stdout }}
  when: existing_settings.stat.exists and settings_diff.stdout != "" and settings_diff.stdout != "NEW_FILE"

- name: 询问是否继续更新
  pause:
    prompt: |
      ========================================
      ⚠️  检测到配置变更！
      ========================================
      {% if settings_diff.stdout == "NEW_FILE" %}
      将创建新的 settings.json 文件
      {% else %}
      上述差异将被应用
      {% endif %}

      备份文件：{% if timestamp.stdout is defined %}tmps/backup/settings.json.{{ timestamp.stdout }}{% else %}（无需备份）{% endif %}

      是否继续？(yes/no)
  when: settings_diff.stdout != "" and settings.confirm_settings_update | default(true) | bool
  register: user_confirmation

- name: 确认用户选择
  fail:
    msg: "用户取消了配置更新"
  when: settings_diff.stdout != "" and settings.confirm_settings_update | default(true) | bool and user_confirmation.user_input != "yes" and user_confirmation.user_input != "y"

- name: 更新 settings.json
  copy:
    src: /tmp/claude_settings_new.json
    dest: ~/.claude/settings.json
    mode: "0644"
  when: settings_diff.stdout != ""

- name: 同步 output-styles 目录
  synchronize:
    src: "{{ playbook_dir }}/../claude-assets/output-styles/"
    dest: ~/.claude/output-styles/
    delete: true
    recursive: true
  delegate_to: localhost

- name: 同步 commands 目录
  synchronize:
    src: "{{ playbook_dir }}/../claude-assets/commands/"
    dest: ~/.claude/commands/
    delete: true
    recursive: true
  delegate_to: localhost

- name: 同步 agents 目录
  synchronize:
    src: "{{ playbook_dir }}/../claude-assets/agents/"
    dest: ~/.claude/agents/
    delete: true
    recursive: true
  delegate_to: localhost

- name: 拷贝 CLAUDE.md 文件
  copy:
    src: "{{ playbook_dir }}/../claude-assets/CLAUDE.md"
    dest: ~/.claude/CLAUDE.md
    mode: "0644"

- name: 渲染 .mcp.json（如果配置了 custom_mcp_servers）
  template:
    src: "{{ playbook_dir }}/../claude-assets/.mcp.json.j2"
    dest: /tmp/claude_mcp.json
    mode: "0644"
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0

- name: 检查现有 .mcp.json 是否存在
  stat:
    path: ~/.claude/.mcp.json
  register: existing_mcp_config
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0

- name: 格式化新的 .mcp.json
  shell: |
    if command -v jq >/dev/null 2>&1; then
      jq . /tmp/claude_mcp.json > /tmp/claude_mcp_sorted.json 2>/dev/null || cp /tmp/claude_mcp.json /tmp/claude_mcp_sorted.json
    else
      cp /tmp/claude_mcp.json /tmp/claude_mcp_sorted.json
    fi
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0
  changed_when: false

- name: 格式化现有 .mcp.json（如果存在）
  shell: |
    if command -v jq >/dev/null 2>&1; then
      jq . ~/.claude/.mcp.json > /tmp/claude_mcp_existing_sorted.json 2>/dev/null || cp ~/.claude/.mcp.json /tmp/claude_mcp_existing_sorted.json
    else
      cp ~/.claude/.mcp.json /tmp/claude_mcp_existing_sorted.json
    fi
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and existing_mcp_config.stat.exists
  changed_when: false

- name: 检查 .mcp.json 是否有差异
  shell: |
    if [ -f /tmp/claude_mcp_existing_sorted.json ]; then
      diff -u /tmp/claude_mcp_existing_sorted.json /tmp/claude_mcp_sorted.json || true
    else
      echo "NEW_FILE"
    fi
  register: mcp_diff
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0
  changed_when: false

- name: 显示 .mcp.json 差异
  debug:
    msg: |
      ========================================
      .mcp.json 差异预览
      ========================================
      {% if mcp_diff.stdout == "NEW_FILE" %}
      这是首次创建 .mcp.json 文件
      {% elif mcp_diff.stdout == "" %}
      ✓ MCP 配置无变化，无需更新
      {% else %}
      {{ mcp_diff.stdout }}
      {% endif %}
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0

- name: 生成 .mcp.json 时间戳
  shell: date +"%Y%m%d_%H%M%S"
  register: mcp_timestamp
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and existing_mcp_config.stat.exists and mcp_diff.stdout != "" and mcp_diff.stdout != "NEW_FILE"
  changed_when: false

- name: 备份现有 .mcp.json
  copy:
    src: ~/.claude/.mcp.json
    dest: "{{ playbook_dir }}/../tmps/backup/.mcp.json.{{ mcp_timestamp.stdout }}"
    mode: "0644"
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and existing_mcp_config.stat.exists and mcp_diff.stdout != "" and mcp_diff.stdout != "NEW_FILE"

- name: 显示 .mcp.json 备份信息
  debug:
    msg: |
      备份已创建：tmps/backup/.mcp.json.{{ mcp_timestamp.stdout }}
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and existing_mcp_config.stat.exists and mcp_diff.stdout != "" and mcp_diff.stdout != "NEW_FILE"

- name: 询问是否继续更新 .mcp.json
  pause:
    prompt: |
      ========================================
      ⚠️  检测到 .mcp.json 变更！
      ========================================
      {% if mcp_diff.stdout == "NEW_FILE" %}
      将创建新的 .mcp.json 文件
      {% else %}
      上述差异将被应用
      {% endif %}

      备份文件：{% if mcp_timestamp.stdout is defined %}tmps/backup/.mcp.json.{{ mcp_timestamp.stdout }}{% else %}（无需备份）{% endif %}

      是否继续？(yes/no)
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and mcp_diff.stdout != "" and settings.confirm_settings_update | default(true) | bool
  register: mcp_user_confirmation

- name: 确认 .mcp.json 用户选择
  fail:
    msg: "用户取消了 .mcp.json 更新"
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and mcp_diff.stdout != "" and settings.confirm_settings_update | default(true) | bool and mcp_user_confirmation.user_input != "yes" and mcp_user_confirmation.user_input != "y"

- name: 更新 .mcp.json
  copy:
    src: /tmp/claude_mcp_sorted.json
    dest: ~/.claude/.mcp.json
    mode: "0644"
  when: settings.custom_mcp_servers is defined and settings.custom_mcp_servers | length > 0 and mcp_diff.stdout != ""

- name: 删除未配置的 .mcp.json（如果 custom_mcp_servers 为空）
  file:
    path: ~/.claude/.mcp.json
    state: absent
  when: settings.custom_mcp_servers is not defined or settings.custom_mcp_servers | length == 0

- name: 显示配置同步完成信息
  debug:
    msg: "✓ 配置同步完成"
