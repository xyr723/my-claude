# ===== 自定义 MCP 服务器配置（非插件市场） =====
# 用于配置非插件市场的自定义 MCP 服务器
# 使用 claude mcp add-json 命令进行管理
# mcp_scope: MCP 配置的作用域（local/project/user）
#   - local: 仅当前项目可用（默认）
#   - project: 项目级别，提交到版本控制
#   - user: 用户级别，所有项目可用
mcp_scope: "user"
# 格式（stdio 类型）：
#   - name: 服务器名称（唯一标识）
#     type: "stdio"（可选，默认 stdio）
#     command: 启动命令（如 python、node、npx）
#     args: 命令参数（数组格式）
#     env: 环境变量（可选，支持从 secrets.yml 引用）
# 格式（HTTP 类型）：
#   - name: 服务器名称（唯一标识）
#     type: "http"
#     url: 服务器 URL
#     headers: HTTP 请求头（可选，用于认证）
#       Authorization: "Bearer your-token"
#       X-API-Key: "your-api-key"
custom_mcp_servers:
  - name: "mcp-server-fetch"
    command: "uvx"
    args: ["mcp-server-fetch"]
  - name: "deepwiki"
    type: "http"
    url: "https://mcp.deepwiki.com/mcp"
